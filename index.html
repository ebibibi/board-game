<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortress Clash — オリジナルボードゲーム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            margin: 16px 0 4px;
            font-size: 1.6rem;
            letter-spacing: 2px;
        }

        #status {
            font-size: 1rem;
            margin-bottom: 8px;
            color: #aaa;
            min-height: 1.4em;
        }

        canvas {
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
        }

        #ui {
            display: flex;
            gap: 16px;
            margin: 12px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .unit-btn {
            padding: 10px 16px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }
        .unit-btn:hover { border-color: #888; background: #252540; }
        .unit-btn.selected { border-color: #ffcc00; background: #2a2a45; }

        .action-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.15s;
        }
        .action-btn:hover { filter: brightness(1.2); }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #btn-ready { background: #22aa44; color: #fff; }
        #btn-reset { background: #555; color: #fff; }

        #controls {
            display: flex;
            gap: 12px;
            margin: 8px 0 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #info {
            display: flex;
            gap: 32px;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }
        .player-info { padding: 6px 16px; border-radius: 6px; }
        .p1-info { background: rgba(68, 136, 255, 0.2); border: 1px solid #4488ff; }
        .p2-info { background: rgba(255, 68, 68, 0.2); border: 1px solid #ff4444; }

        #speed-control {
            display: none;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
            font-size: 0.85rem;
            color: #aaa;
        }
        #speed-control input { width: 100px; }

        /* Handover overlay — blocks screen between players */
        #handover-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0f0f1a;
            justify-content: center;
            align-items: center;
            z-index: 90;
            flex-direction: column;
            gap: 20px;
        }
        #handover-overlay h2 { font-size: 2rem; }
        #handover-overlay p { font-size: 1.1rem; color: #aaa; }

        #result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #result-box {
            background: #1a1a2e;
            border: 2px solid #ffcc00;
            border-radius: 16px;
            padding: 40px 60px;
            text-align: center;
        }
        #result-box h2 { font-size: 2rem; margin-bottom: 12px; }
        #result-box p { font-size: 1.1rem; color: #aaa; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>⚔️ Fortress Clash</h1>
    <div id="status">Player 1: 配置してください</div>

    <div id="info">
        <div class="player-info p1-info">🔵 P1 拠点 HP: <span id="p1-hp">20</span></div>
        <div class="player-info p2-info">🔴 P2 拠点 HP: <span id="p2-hp">20</span></div>
    </div>

    <div id="board-container">
        <canvas id="canvas" width="640" height="512"></canvas>
    </div>

    <div id="ui"></div>
    <div id="controls">
        <button class="action-btn" id="btn-ready">配置完了 ✓</button>
        <button class="action-btn" id="btn-reset">リセット 🔄</button>
    </div>
    <div id="speed-control">
        <label>速度:</label>
        <input type="range" id="speed" min="1" max="5" value="3">
        <span id="speed-label">x1.0</span>
    </div>

    <!-- Handover screen between P1 and P2 -->
    <div id="handover-overlay">
        <h2 id="handover-title"></h2>
        <p id="handover-desc"></p>
        <button class="action-btn" id="btn-handover" style="background:#ffcc00;color:#000;font-size:1.2rem;padding:14px 40px;">準備OK</button>
    </div>

    <div id="result-overlay">
        <div id="result-box">
            <h2 id="result-title"></h2>
            <p id="result-detail"></p>
            <button class="action-btn" id="btn-replay" style="background:#ffcc00;color:#000;">もう一回遊ぶ</button>
        </div>
    </div>

<script>
// ============================================================
// Fortress Clash — Browser Board Game
// ============================================================

var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');

var COLS = 10;
var ROWS = 8;
var CELL = 64;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

var P1 = 1;
var P2 = 2;

var UNIT_TYPES = {
    warrior:  { name: '戦士', emoji: '⚔️', hp: 10, atk: 3, range: 1, speed: 2, desc: '近接・速い' },
    archer:   { name: '弓兵', emoji: '🏹', hp: 6,  atk: 2, range: 3, speed: 1, desc: '遠距離攻撃' },
    tank:     { name: '盾兵', emoji: '🛡️', hp: 18, atk: 1, range: 1, speed: 1, desc: '高HP壁役' },
    mage:     { name: '魔法', emoji: '🧙', hp: 5,  atk: 4, range: 2, speed: 1, desc: '高火力' },
};
var MAX_UNITS = 5;
var FORTRESS_HP = 20;

// P1 fortress: left side center, P2 fortress: right side center
var FORTRESS_P1 = { x: 0, y: 3 };
var FORTRESS_P2 = { x: 9, y: 4 };

// ---- Game State ----
var phase = 'place_p1'; // place_p1, handover, place_p2, countdown, battle, ended
var currentPlayer = P1;
var selectedType = 'warrior';
var units = [];
var fortresses = {
    1: { player: P1, x: FORTRESS_P1.x, y: FORTRESS_P1.y, hp: FORTRESS_HP, maxHp: FORTRESS_HP },
    2: { player: P2, x: FORTRESS_P2.x, y: FORTRESS_P2.y, hp: FORTRESS_HP, maxHp: FORTRESS_HP },
};
var placedCount = { 1: 0, 2: 0 };
var battleTimer = null;
var tickInterval = 300;
var tickCount = 0;
var countdownValue = 0;

// ---- Helpers ----
function getUnit(x, y) {
    for (var i = 0; i < units.length; i++) {
        if (units[i].x === x && units[i].y === y && units[i].hp > 0) return units[i];
    }
    return null;
}

function isFortressAt(x, y) {
    return (fortresses[1].x === x && fortresses[1].y === y) ||
           (fortresses[2].x === x && fortresses[2].y === y);
}

function dist(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }

function isPlacementZone(x, y, player) {
    if (player === P1) return x >= 0 && x <= 2;
    return x >= 7 && x <= 9;
}

// ---- Drawing ----
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawFortresses();
    drawUnits();
    drawHoverInfo();
}

function drawGrid() {
    for (var y = 0; y < ROWS; y++) {
        for (var x = 0; x < COLS; x++) {
            var px = x * CELL;
            var py = y * CELL;

            var bg = '#18181e';
            if (phase === 'place_p1' && isPlacementZone(x, y, P1)) bg = '#1a2244';
            else if (phase === 'place_p2' && isPlacementZone(x, y, P2)) bg = '#2a1a1a';
            else if (x <= 2) bg = '#141430';
            else if (x >= 7) bg = '#1e1418';

            ctx.fillStyle = bg;
            ctx.fillRect(px, py, CELL, CELL);
            ctx.strokeStyle = '#2a2a3a';
            ctx.strokeRect(px, py, CELL, CELL);
        }
    }

    // Center divider
    ctx.strokeStyle = '#444';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(5 * CELL, 0);
    ctx.lineTo(5 * CELL, ROWS * CELL);
    ctx.stroke();
    ctx.setLineDash([]);
}

function drawFortress(f, playerNum) {
    var px = f.x * CELL + CELL / 2;
    var py = f.y * CELL + CELL / 2;

    // Glow
    ctx.shadowColor = playerNum === P1 ? '#4488ff' : '#ff4444';
    ctx.shadowBlur = f.hp > 0 ? 15 : 0;

    // Base circle
    ctx.fillStyle = f.hp > 0 ? (playerNum === P1 ? '#335599' : '#993333') : '#333';
    ctx.beginPath();
    ctx.arc(px, py, CELL * 0.42, 0, Math.PI * 2);
    ctx.fill();

    // Border
    ctx.strokeStyle = playerNum === P1 ? '#4488ff' : '#ff4444';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.lineWidth = 1;

    ctx.shadowBlur = 0;

    // Castle icon
    ctx.font = '26px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🏰', px, py - 2);

    // Player label
    ctx.font = 'bold 10px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(playerNum === P1 ? 'P1' : 'P2', px, py - CELL * 0.35);

    // HP bar
    if (f.hp > 0) {
        var bw = CELL * 0.7;
        var bx = px - bw / 2;
        var by = py + CELL * 0.34;
        ctx.fillStyle = '#333';
        ctx.fillRect(bx, by, bw, 6);
        ctx.fillStyle = f.hp / f.maxHp > 0.3 ? '#44cc44' : '#ff4444';
        ctx.fillRect(bx, by, bw * (f.hp / f.maxHp), 6);
        ctx.strokeStyle = '#555';
        ctx.strokeRect(bx, by, bw, 6);
    }
}

function drawFortresses() {
    drawFortress(fortresses[1], P1);
    drawFortress(fortresses[2], P2);
}

function drawUnits() {
    for (var i = 0; i < units.length; i++) {
        var u = units[i];
        if (u.hp <= 0) continue;

        // During placement, only show current player's units
        if (phase === 'place_p1' && u.player !== P1) continue;
        if (phase === 'place_p2' && u.player !== P2) continue;

        var px = u.x * CELL + CELL / 2;
        var py = u.y * CELL + CELL / 2;
        var type = UNIT_TYPES[u.type];

        // Team color circle
        ctx.fillStyle = u.player === P1 ? 'rgba(68,136,255,0.3)' : 'rgba(255,68,68,0.3)';
        ctx.beginPath();
        ctx.arc(px, py, CELL * 0.38, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = u.player === P1 ? '#4488ff' : '#ff4444';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.lineWidth = 1;

        // Emoji
        ctx.font = '22px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(type.emoji, px, py - 2);

        // HP bar
        var bw = CELL * 0.6;
        var bx = px - bw / 2;
        var by = py + CELL * 0.3;
        ctx.fillStyle = '#222';
        ctx.fillRect(bx, by, bw, 4);
        var hpRatio = u.hp / UNIT_TYPES[u.type].hp;
        ctx.fillStyle = hpRatio > 0.5 ? '#44cc44' : hpRatio > 0.25 ? '#ccaa00' : '#ff4444';
        ctx.fillRect(bx, by, bw * hpRatio, 4);

        // Attack flash
        if (u.flashTimer > 0) {
            ctx.fillStyle = 'rgba(255,255,100,' + (u.flashTimer * 0.15) + ')';
            ctx.beginPath();
            ctx.arc(px, py, CELL * 0.42, 0, Math.PI * 2);
            ctx.fill();
            u.flashTimer--;
        }
    }
}

var hoverCell = null;
function drawHoverInfo() {
    if (!hoverCell) return;
    var x = hoverCell.x;
    var y = hoverCell.y;

    if ((phase === 'place_p1' || phase === 'place_p2') &&
        isPlacementZone(x, y, currentPlayer) &&
        !getUnit(x, y) && !isFortressAt(x, y)) {
        ctx.fillStyle = 'rgba(255,204,0,0.15)';
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
    }
}

// ---- UI Building ----
function buildUI() {
    var uiEl = document.getElementById('ui');
    while (uiEl.firstChild) uiEl.removeChild(uiEl.firstChild);

    if (phase !== 'place_p1' && phase !== 'place_p2') {
        uiEl.style.display = 'none';
        return;
    }
    uiEl.style.display = 'flex';

    var remaining = MAX_UNITS - placedCount[currentPlayer];

    var keys = Object.keys(UNIT_TYPES);
    for (var i = 0; i < keys.length; i++) {
        var key = keys[i];
        var type = UNIT_TYPES[key];

        var btn = document.createElement('button');
        btn.className = 'unit-btn' + (key === selectedType ? ' selected' : '');

        var nameText = document.createTextNode(type.emoji + ' ' + type.name);
        btn.appendChild(nameText);
        btn.appendChild(document.createElement('br'));

        var descSpan = document.createElement('span');
        descSpan.style.cssText = 'font-size:0.8rem;color:#aaa;';
        descSpan.textContent = type.desc;
        btn.appendChild(descSpan);

        (function(k) {
            btn.addEventListener('click', function() { selectedType = k; buildUI(); });
        })(key);
        uiEl.appendChild(btn);
    }

    var countEl = document.createElement('div');
    countEl.style.cssText = 'display:flex;align-items:center;font-size:1rem;color:#ffcc00;';
    countEl.textContent = '残り ' + remaining + ' 体';
    uiEl.appendChild(countEl);
}

function updateStatus() {
    var el = document.getElementById('status');
    document.getElementById('p1-hp').textContent = String(Math.max(0, Math.ceil(fortresses[1].hp)));
    document.getElementById('p2-hp').textContent = String(Math.max(0, Math.ceil(fortresses[2].hp)));

    var readyBtn = document.getElementById('btn-ready');
    var speedCtrl = document.getElementById('speed-control');

    switch (phase) {
        case 'place_p1':
            el.textContent = '🔵 Player 1: キャラを配置してください（残り ' + (MAX_UNITS - placedCount[1]) + ' 体）';
            readyBtn.style.display = '';
            readyBtn.disabled = placedCount[1] === 0;
            speedCtrl.style.display = 'none';
            break;
        case 'place_p2':
            el.textContent = '🔴 Player 2: キャラを配置してください（残り ' + (MAX_UNITS - placedCount[2]) + ' 体）';
            readyBtn.style.display = '';
            readyBtn.disabled = placedCount[2] === 0;
            speedCtrl.style.display = 'none';
            break;
        case 'countdown':
            el.textContent = '⚔️ バトル開始まで... ' + countdownValue;
            readyBtn.style.display = 'none';
            speedCtrl.style.display = 'none';
            break;
        case 'battle':
            el.textContent = '⚔️ バトル中！ (ターン ' + tickCount + ')';
            readyBtn.style.display = 'none';
            speedCtrl.style.display = 'flex';
            break;
        case 'ended':
            readyBtn.style.display = 'none';
            speedCtrl.style.display = 'none';
            break;
        default:
            readyBtn.style.display = 'none';
            speedCtrl.style.display = 'none';
            break;
    }
}

// ---- Placement ----
canvas.addEventListener('click', function(e) {
    var rect = canvas.getBoundingClientRect();
    var x = Math.floor((e.clientX - rect.left) / CELL);
    var y = Math.floor((e.clientY - rect.top) / CELL);

    if (phase !== 'place_p1' && phase !== 'place_p2') return;
    if (placedCount[currentPlayer] >= MAX_UNITS) return;
    if (!isPlacementZone(x, y, currentPlayer)) return;
    if (getUnit(x, y) || isFortressAt(x, y)) return;

    units.push({
        player: currentPlayer,
        type: selectedType,
        x: x, y: y,
        hp: UNIT_TYPES[selectedType].hp,
        cooldown: 0,
        flashTimer: 0,
    });
    placedCount[currentPlayer]++;
    buildUI();
    updateStatus();
    draw();
});

canvas.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var x = Math.floor((e.clientX - rect.left) / CELL);
    var y = Math.floor((e.clientY - rect.top) / CELL);

    if (phase !== 'place_p1' && phase !== 'place_p2') return;

    for (var i = units.length - 1; i >= 0; i--) {
        if (units[i].x === x && units[i].y === y && units[i].player === currentPlayer) {
            units.splice(i, 1);
            placedCount[currentPlayer]--;
            buildUI();
            updateStatus();
            draw();
            break;
        }
    }
});

canvas.addEventListener('mousemove', function(e) {
    var rect = canvas.getBoundingClientRect();
    hoverCell = {
        x: Math.floor((e.clientX - rect.left) / CELL),
        y: Math.floor((e.clientY - rect.top) / CELL),
    };
    if (phase === 'place_p1' || phase === 'place_p2') draw();
});

// ---- Ready button: P1 done → handover → P2 done → countdown → battle ----
document.getElementById('btn-ready').addEventListener('click', function() {
    if (phase === 'place_p1') {
        // Show handover screen so P2 doesn't see P1's placement
        phase = 'handover';
        document.getElementById('handover-title').textContent = '🔴 Player 2 の番です';
        document.getElementById('handover-desc').textContent = 'Player 1 は画面を渡してください。Player 2 が準備できたらボタンを押してね！';
        document.getElementById('handover-overlay').style.display = 'flex';
        buildUI();
        updateStatus();
    } else if (phase === 'place_p2') {
        // Both done — start countdown
        phase = 'countdown';
        buildUI();
        updateStatus();
        draw();
        startCountdown();
    }
});

// ---- Handover: P2 presses "ready" ----
document.getElementById('btn-handover').addEventListener('click', function() {
    if (phase === 'handover') {
        document.getElementById('handover-overlay').style.display = 'none';
        phase = 'place_p2';
        currentPlayer = P2;
        selectedType = 'warrior';
        buildUI();
        updateStatus();
        draw();
    }
});

// ---- Countdown before battle ----
function startCountdown() {
    countdownValue = 3;
    updateStatus();
    draw();

    var countdownTimer = setInterval(function() {
        countdownValue--;
        if (countdownValue <= 0) {
            clearInterval(countdownTimer);
            startBattle();
        } else {
            updateStatus();
        }
    }, 800);
}

// ---- Speed ----
document.getElementById('speed').addEventListener('input', function(e) {
    var v = parseInt(e.target.value);
    var speeds = { 1: 600, 2: 400, 3: 300, 4: 150, 5: 80 };
    var labels = { 1: 'x0.5', 2: 'x0.75', 3: 'x1.0', 4: 'x2.0', 5: 'x4.0' };
    tickInterval = speeds[v];
    document.getElementById('speed-label').textContent = labels[v];
    if (battleTimer) {
        clearInterval(battleTimer);
        battleTimer = setInterval(battleTick, tickInterval);
    }
});

// ---- Battle Logic ----
function startBattle() {
    phase = 'battle';
    tickCount = 0;
    buildUI();
    updateStatus();
    draw();
    battleTimer = setInterval(battleTick, tickInterval);
}

function battleTick() {
    tickCount++;

    var aliveUnits = [];
    for (var i = 0; i < units.length; i++) {
        if (units[i].hp > 0) aliveUnits.push(units[i]);
    }

    for (var i = 0; i < aliveUnits.length; i++) {
        var u = aliveUnits[i];
        if (u.cooldown > 0) { u.cooldown--; continue; }

        var type = UNIT_TYPES[u.type];
        var enemyPlayer = u.player === P1 ? P2 : P1;

        // Find nearest target (enemy unit or enemy fortress)
        var target = null;
        var targetDist = Infinity;
        var targetIsFortress = false;

        for (var j = 0; j < aliveUnits.length; j++) {
            var e = aliveUnits[j];
            if (e.player === u.player) continue;
            var d = dist(u, e);
            if (d < targetDist) { target = e; targetDist = d; targetIsFortress = false; }
        }

        var ef = fortresses[enemyPlayer];
        if (ef && ef.hp > 0) {
            var d2 = dist(u, ef);
            if (d2 < targetDist) { target = ef; targetDist = d2; targetIsFortress = true; }
        }

        if (!target) continue;

        if (targetDist <= type.range) {
            // Attack
            target.hp -= type.atk;
            u.cooldown = Math.max(1, 3 - type.speed);
            u.flashTimer = 3;

            if (target.hp <= 0 && targetIsFortress) {
                endGame(u.player);
                return;
            }
        } else {
            // Move toward target
            var dx = Math.sign(target.x - u.x);
            var dy = Math.sign(target.y - u.y);

            var candidates = [
                { x: u.x + dx, y: u.y },
                { x: u.x, y: u.y + dy },
                { x: u.x + dx, y: u.y + dy },
            ];
            var moved = false;
            for (var k = 0; k < candidates.length; k++) {
                var m = candidates[k];
                if (m.x >= 0 && m.x < COLS && m.y >= 0 && m.y < ROWS &&
                    !getUnit(m.x, m.y) && !isFortressAt(m.x, m.y)) {
                    u.x = m.x;
                    u.y = m.y;
                    moved = true;
                    break;
                }
            }

            // Fast units get second move
            if (type.speed >= 2 && moved) {
                var dx2 = Math.sign(target.x - u.x);
                var dy2 = Math.sign(target.y - u.y);
                var cands2 = [
                    { x: u.x + dx2, y: u.y },
                    { x: u.x, y: u.y + dy2 },
                ];
                for (var k2 = 0; k2 < cands2.length; k2++) {
                    var m2 = cands2[k2];
                    if (m2.x >= 0 && m2.x < COLS && m2.y >= 0 && m2.y < ROWS &&
                        !getUnit(m2.x, m2.y) && !isFortressAt(m2.x, m2.y)) {
                        u.x = m2.x;
                        u.y = m2.y;
                        break;
                    }
                }
            }

            u.cooldown = 0;
        }
    }

    // Remove dead units
    var alive = [];
    for (var i = 0; i < units.length; i++) {
        if (units[i].hp > 0) alive.push(units[i]);
    }
    units = alive;

    // If all units on both sides dead, compare fortress HP
    var p1alive = false;
    var p2alive = false;
    for (var i = 0; i < units.length; i++) {
        if (units[i].player === P1) p1alive = true;
        if (units[i].player === P2) p2alive = true;
    }
    if (!p1alive && !p2alive) {
        if (fortresses[1].hp > fortresses[2].hp) endGame(P1);
        else if (fortresses[2].hp > fortresses[1].hp) endGame(P2);
        else endGame(0);
        return;
    }

    updateStatus();
    draw();
}

function endGame(winner) {
    phase = 'ended';
    clearInterval(battleTimer);
    battleTimer = null;

    var title = document.getElementById('result-title');
    var detail = document.getElementById('result-detail');

    if (winner === 0) {
        title.textContent = '引き分け！';
        detail.textContent = '両者の拠点が同じHPでした';
    } else {
        var color = winner === P1 ? '🔵' : '🔴';
        title.textContent = color + ' Player ' + winner + ' の勝利！';
        detail.textContent = 'ターン ' + tickCount + ' で決着';
    }

    document.getElementById('result-overlay').style.display = 'flex';
    updateStatus();
    draw();
}

// ---- Reset ----
document.getElementById('btn-replay').addEventListener('click', resetGame);
document.getElementById('btn-reset').addEventListener('click', resetGame);

function resetGame() {
    clearInterval(battleTimer);
    battleTimer = null;
    phase = 'place_p1';
    currentPlayer = P1;
    selectedType = 'warrior';
    units = [];
    placedCount = { 1: 0, 2: 0 };
    tickCount = 0;
    fortresses[1].hp = FORTRESS_HP;
    fortresses[2].hp = FORTRESS_HP;
    document.getElementById('result-overlay').style.display = 'none';
    document.getElementById('handover-overlay').style.display = 'none';
    buildUI();
    updateStatus();
    draw();
}

// ---- Init ----
buildUI();
updateStatus();
draw();
</script>
</body>
</html>
